queue_rules:
  - name: default
    queue_conditions:
      - check-success~=pre-commit
      - "#approved-reviews-by>=1"
      - -draft
      - -conflict
      - -closed
      - label!=do-not-merge
    merge_conditions:
      - check-success~=buildkite/ci
    merge_method: squash
    commit_message_template: |
      {{ title }} (#{{ number }})

      {{ body }}

merge_protections:
  - name: PR title must follow conventional format
    if:
      - base = main
    success_conditions:
      - "title~=(?i)^\\[(feat|feature|bugfix|fix|refactor|perf|ci|doc|docs|misc|chore|kernel|new.?model)\\]"

pull_request_rules:

  # ============================================================
  # Auto-labeling by file path
  # ============================================================

  - name: label attention changes
    conditions:
      - or:
        - files~=^fastvideo/attention/
        - files~=^csrc/attn/
      - -closed
      - label!=stale
    actions:
      label:
        add: [attention]

  - name: label encoder changes
    conditions:
      - files~=^fastvideo/models/encoders/
      - -closed
      - label!=stale
    actions:
      label:
        add: [encoder]

  - name: label vae changes
    conditions:
      - files~=^fastvideo/models/vaes/
      - -closed
      - label!=stale
    actions:
      label:
        add: [vae]

  - name: label transformer/DiT changes
    conditions:
      - files~=^fastvideo/models/dits/
      - -closed
      - label!=stale
    actions:
      label:
        add: [transformer]

  - name: label training changes
    conditions:
      - files~=^fastvideo/training/
      - -closed
      - label!=stale
    actions:
      label:
        add: [training]

  - name: label pipeline changes
    conditions:
      - files~=^fastvideo/pipelines/
      - -closed
      - label!=stale
    actions:
      label:
        add: [pipeline]

  - name: label distributed changes
    conditions:
      - files~=^fastvideo/distributed/
      - -closed
      - label!=stale
    actions:
      label:
        add: [distributed]

  - name: label kernel changes
    conditions:
      - or:
        - files~=^csrc/
        - files~=^fastvideo-kernel/
      - -closed
      - label!=stale
    actions:
      label:
        add: [kernel]

  - name: label data/dataset changes
    conditions:
      - or:
        - files~=^fastvideo/dataset/
        - files~=^fastvideo/data_preprocess/
      - -closed
      - label!=stale
    actions:
      label:
        add: [data]

  - name: label CLI/entrypoint changes
    conditions:
      - files~=^fastvideo/entrypoints/
      - -closed
      - label!=stale
    actions:
      label:
        add: [cli]

  - name: label documentation changes
    conditions:
      - or:
        - files~=^docs/
        - files~=\.md$
      - -closed
      - label!=stale
    actions:
      label:
        add: [documentation]

  - name: label CI changes
    conditions:
      - or:
        - files~=^\.github/
        - files~=^\.buildkite/
        - files~=^docker/
      - -closed
      - label!=stale
    actions:
      label:
        add: [ci]

  - name: label test changes
    conditions:
      - or:
        - files~=^fastvideo/tests/
        - files~=^tests/
      - -closed
      - label!=stale
    actions:
      label:
        add: [tests]

  - name: label ComfyUI changes
    conditions:
      - files~=^comfyui/
      - -closed
      - label!=stale
    actions:
      label:
        add: [comfyui]

  - name: label layer changes
    conditions:
      - files~=^fastvideo/layers/
      - -closed
      - label!=stale
    actions:
      label:
        add: [layers]

  - name: label LoRA changes
    conditions:
      - or:
        - files~=^fastvideo/layers/lora/
        - files~=^fastvideo/tests/lora/
        - title~=(?i)lora
      - -closed
      - label!=stale
    actions:
      label:
        add: [lora]

  # ============================================================
  # Pre-commit failure help comment
  # ============================================================

  - name: comment on pre-commit failure
    conditions:
      - check-failure~=pre-commit
      - -closed
    actions:
      comment:
        message: |
          ## Pre-commit checks failed

          Hi @{{author}}, the pre-commit checks have failed. To fix them locally:

          ```bash
          # Install pre-commit if you haven't already
          uv pip install pre-commit
          pre-commit install

          # Run all checks and auto-fix what's possible
          pre-commit run --all-files
          ```

          Common fixes:
          - **yapf**: `yapf -i <file>` (formatting)
          - **ruff**: `ruff check --fix <file>` (linting)
          - **codespell**: `codespell --write-changes <file>` (spelling)

          After fixing, commit and push the changes. The checks will re-run automatically.

          For future commits, `pre-commit` will run automatically on changed files before each commit.

  # ============================================================
  # Buildkite CI failure notification
  # ============================================================

  - name: comment on Buildkite CI failure
    conditions:
      - check-failure~=buildkite/ci
      - -closed
    actions:
      comment:
        message: |
          ## Buildkite CI tests failed

          Hi @{{author}}, some Buildkite CI tests have failed. Check the build for details:
          [View Buildkite build →](https://buildkite.com/fastvideo/ci)

          Common causes:
          - **Test failures**: Check the failing step's output for assertion errors or tracebacks
          - **Import errors**: Make sure new dependencies are added to `pyproject.toml`
          - **GPU memory**: Some tests require specific GPU types (L40S, H100 NVL)
          - **Kernel build**: If you changed `fastvideo-kernel/`, the build may have failed

          If the failure is unrelated to your changes, leave a comment explaining why.

  # ============================================================
  # Merge conflict detection
  # ============================================================

  - name: label conflicting PRs
    conditions:
      - conflict
      - -closed
      - label!=stale
    actions:
      label:
        add: [needs-rebase]
      comment:
        message: |
          This PR has merge conflicts with the base branch. Please rebase:

          ```bash
          git fetch origin main
          git rebase origin/main
          # Resolve any conflicts, then:
          git push --force-with-lease
          ```

  - name: remove conflict label when resolved
    conditions:
      - -conflict
      - -closed
      - label=needs-rebase
    actions:
      label:
        remove: [needs-rebase]

  # ============================================================
  # Auto-rebase stale PRs
  # ============================================================

  - name: auto-merge when ready and approved
    conditions:
      - label=ready
      - "#approved-reviews-by>=1"
      - check-success~=pre-commit
      - -conflict
      - -closed
      - -draft
    actions:
      merge:
        method: squash

  - name: auto-rebase on ready label
    conditions:
      - label=ready
      - "#approved-reviews-by>=1"
      - -conflict
      - -closed
    actions:
      rebase: {}

  - name: comment on invalid PR title format
    conditions:
      - -closed
      - -draft
      - -"title~=(?i)^\\[(feat|feature|bugfix|fix|refactor|perf|ci|doc|docs|misc|chore|kernel|new.?model)\\]"
    actions:
      comment:
        message: |
          ## ⚠️ PR title format required

          Your PR title must start with a type tag in brackets. Examples:
          - `[feat] Add new model support`
          - `[bugfix] Fix VAE tiling corruption`
          - `[refactor] Restructure training pipeline`
          - `[perf] Optimize attention kernel`
          - `[ci] Update test infrastructure`
          - `[docs] Add inference guide`
          - `[misc] Clean up configs`
          - `[new-model] Port Flux2 to FastVideo`

          Valid tags: `feat`, `feature`, `bugfix`, `fix`, `refactor`, `perf`, `ci`, `doc`, `docs`, `misc`, `chore`, `kernel`, `new-model`

          Please update your PR title and the merge protection check will pass automatically.

  - name: delete merged branch
    conditions:
      - merged
      - -head~=^(main|master|release[/-])$
    actions:
      delete_head_branch: {}
