name: Build Image Template

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      tag_suffix:
        required: true
        type: string
      image_name:
        required: false
        type: string
        default: fastvideo-dev
      build_args:
        required: false
        type: string
        default: ''
      include_latest_tags:
        required: false
        type: boolean
        default: true
      mark_as_latest:
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Free up disk space
        run: |
          # Display initial space
          echo "Initial disk space:"
          df -h
          
          # Remove large directories directly
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/rust
          sudo rm -rf /usr/local/.ghcup
          
          # Remove cached files
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*
          
          # Clean Docker
          docker system prune -af --volumes
          
          # Display available space after cleanup
          echo "Disk space after cleanup:"
          df -h
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prepare tags
        id: prepare-tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          TAGS="type=raw,value=${{ inputs.tag_suffix }}-sha-${SHORT_SHA}"

          if [[ "${{ inputs.include_latest_tags }}" == "true" ]]; then
            TAGS="type=raw,value=${{ inputs.tag_suffix }}-latest\n${TAGS}"
          fi

          # Tag the designated default variant as the global `latest` image
          if [[ "${{ inputs.include_latest_tags }}" == "true" && "${{ inputs.mark_as_latest }}" == "true" ]]; then
            TAGS="${TAGS}\ntype=raw,value=latest"
          fi
          
          {
            echo "tags<<EOF"
            echo -e "$TAGS"
            echo "EOF" 
          } >> $GITHUB_OUTPUT
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.image_name }}
          tags: ${{ steps.prepare-tags.outputs.tags }}
      
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Success message
        run: |
          echo "✅ Python ${{ inputs.python_version }} image successfully built and pushed to ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:${{ inputs.tag_suffix }}-sha-${GITHUB_SHA::7}"
          echo "To run tests with this image, manually trigger the 'Run Tests' workflow."
