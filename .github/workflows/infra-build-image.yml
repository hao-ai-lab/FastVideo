name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.*'
  workflow_dispatch:
    inputs:
      python_3_10:
        description: 'Build Python 3.10 image'
        required: false
        default: false
        type: boolean
      python_3_11:
        description: 'Build Python 3.11 image'
        required: false
        default: false
        type: boolean
      python_3_12:
        description: 'Build Python 3.12 image'
        required: false
        default: false
        type: boolean
      python_3_12_cuda_12_9:
        description: 'Build Python 3.12 image Cuda 12.9'
        required: false
        default: false
        type: boolean

concurrency:
  group: docker-image-build
  cancel-in-progress: true


permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python_3_10: ${{ steps.filter.outputs.python_3_10 }}
      python_3_11: ${{ steps.filter.outputs.python_3_11 }}
      python_3_12: ${{ steps.filter.outputs.python_3_12 }}
      python_3_12_cuda: ${{ steps.filter.outputs.python_3_12_cuda }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed Dockerfiles
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python_3_10:
              - 'docker/Dockerfile.python3.10'
            python_3_11:
              - 'docker/Dockerfile.python3.11'
            python_3_12:
              - 'docker/Dockerfile.python3.12'
            python_3_12_cuda:
              - 'docker/Dockerfile.python3.12.cuda12.9.1'

  build-python-3-10:
    needs: detect-changes
    if: ${{ github.event.inputs.python_3_10 == 'true' || needs.detect-changes.outputs.python_3_10 == 'true' }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.10'
      dockerfile_path: docker/Dockerfile.python3.10
      tag_suffix: py3.10
    secrets: inherit

  build-python-3-11:
    needs: detect-changes
    if: ${{ github.event.inputs.python_3_11 == 'true' || needs.detect-changes.outputs.python_3_11 == 'true' }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.11'
      dockerfile_path: docker/Dockerfile.python3.11
      tag_suffix: py3.11
    secrets: inherit

  build-python-3-12:
    needs: detect-changes
    if: ${{ github.event.inputs.python_3_12 == 'true' || needs.detect-changes.outputs.python_3_12 == 'true' }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: docker/Dockerfile.python3.12
      tag_suffix: py3.12
    secrets: inherit

  build-python-3-12-cuda-12-9:
    needs: detect-changes
    if: ${{ github.event.inputs.python_3_12_cuda_12_9 == 'true' || needs.detect-changes.outputs.python_3_12_cuda == 'true' }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: docker/Dockerfile.python3.12.cuda12.9.1
      tag_suffix: py3.12-cuda12.9.1
    secrets: inherit
