name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      build_cuda_matrix:
        description: 'Build the CUDA image matrix (py3.12 x CUDA 12.6.3/13.0.0)'
        required: false
        default: true
        type: boolean
      build_dreamverse_matrix:
        description: 'Build the Dreamverse matrix (backend + UI x CUDA 12.6.3/13.0.0)'
        required: false
        default: false
        type: boolean


permissions:
  contents: read
  packages: write

jobs:
  # CUDA matrix: Python 3.12 x {12.6.3, 13.0.0}. Each cell pins the torch backend +
  # flash-attn wheel to its base CUDA (both on torch 2.12). 13.0.0 is the default
  # `py3.12`/`latest` (CUDA 13, cu130); 12.6.3 is the broader-driver build. The base
  # image only changes the nvcc that compiles the kernel.
  build-cuda-images:
    if: ${{ github.event.inputs.build_cuda_matrix == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: '12.6.3'
            suffix: '-cuda12.6.3'
            torch_backend: 'cu126'
            fa_tag: 'cu126torch2.12'
            fa_release: 'v0.9.17'
          - version: '13.0.0'
            suffix: ''
            torch_backend: 'cu130'
            fa_tag: 'cu130torch2.12'
            fa_release: 'v0.9.17'
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: docker/Dockerfile
      tag_suffix: py3.12${{ matrix.cuda.suffix }}
      mark_as_latest: ${{ matrix.cuda.version == '13.0.0' }}
      build_args: |
        PYTHON_VERSION=3.12
        CUDA_VERSION=${{ matrix.cuda.version }}
        UV_TORCH_BACKEND=${{ matrix.cuda.torch_backend }}
        FLASH_ATTN_WHEEL_TAG=${{ matrix.cuda.fa_tag }}
        FLASH_ATTN_WHEEL_RELEASE=https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/${{ matrix.cuda.fa_release }}
    secrets: inherit

  # Dreamverse matrix: {backend, UI} x {12.6.3, 13.0.0}, Python 3.12. Torch backend
  # matches the base CUDA (cu126 / cu130). Tagged dreamverse-<variant>-cuda<version>.
  build-dreamverse:
    if: ${{ github.event.inputs.build_dreamverse_matrix == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: '12.6.3'
            torch_backend: 'cu126'
          - version: '13.0.0'
            torch_backend: 'cu130'
        variant:
          - name: backend
            ui: '0'
          - name: ui
            ui: '1'
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: apps/dreamverse/docker/Dockerfile
      tag_suffix: dreamverse-${{ matrix.variant.name }}-cuda${{ matrix.cuda.version }}
      image_name: dreamverse
      build_args: |
        CUDA_VERSION=${{ matrix.cuda.version }}
        UV_TORCH_BACKEND=${{ matrix.cuda.torch_backend }}
        BUILD_DREAMVERSE_UI=${{ matrix.variant.ui }}
      include_latest_tags: false
    secrets: inherit
