name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      build_cuda_matrix:
        description: 'Build the CUDA image matrix (py3.12 x CUDA 12.9.1/13.0.0)'
        required: false
        default: true
        type: boolean
      build_dreamverse_matrix:
        description: 'Build the Dreamverse matrix (backend + UI x CUDA 12.9.1/13.0.0)'
        required: false
        default: false
        type: boolean


permissions:
  contents: read
  packages: write

jobs:
  # CUDA matrix: Python 3.12 x {CUDA 12.9.1, 13.0.0}. (12.8.0 dropped: torch 2.12
  # is not published for cu128.) 12.9.1 gets the `py3.12` tag and `latest`; 13.0.0
  # gets a `-cuda13.0.0` suffix. flash-attn is the same prebuilt wheel for every
  # cell (it tracks torch 2.12.1+cu130, not the base image's CUDA -- see
  # docker/Dockerfile); the base image only changes the nvcc that compiles
  # fastvideo-kernel.
  build-cuda-images:
    if: ${{ github.event.inputs.build_cuda_matrix == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: '12.9.1'
            suffix: ''
          - version: '13.0.0'
            suffix: '-cuda13.0.0'
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: docker/Dockerfile
      tag_suffix: py3.12${{ matrix.cuda.suffix }}
      mark_as_latest: ${{ matrix.cuda.version == '12.9.1' }}
      build_args: |
        PYTHON_VERSION=3.12
        CUDA_VERSION=${{ matrix.cuda.version }}
    secrets: inherit

  # Dreamverse matrix: {backend, UI} x {CUDA 12.9.1, 13.0.0}, Python 3.12.
  # Each image is tagged dreamverse-<variant>-cuda<version> (no `latest`).
  build-dreamverse:
    if: ${{ github.event.inputs.build_dreamverse_matrix == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        cuda: ['12.9.1', '13.0.0']
        variant:
          - name: backend
            ui: '0'
          - name: ui
            ui: '1'
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: apps/dreamverse/docker/Dockerfile
      tag_suffix: dreamverse-${{ matrix.variant.name }}-cuda${{ matrix.cuda }}
      image_name: dreamverse
      build_args: |
        CUDA_VERSION=${{ matrix.cuda }}
        BUILD_DREAMVERSE_UI=${{ matrix.variant.ui }}
      include_latest_tags: false
    secrets: inherit
