name: Publish FastVideo Kernel to Hugging Face Hub

# Version-gated like the PyPI flow (publish-kernel.yml): a push to main only
# publishes when the fastvideo-kernel version actually changes. Use
# workflow_dispatch as the manual override.
on:
  push:
    branches:
      - main
    paths:
      - "fastvideo-kernel/pyproject.toml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Hub branch to upload the build"
        default: ""
        required: false

# A Hub build takes hours; never race two publishes to the same repo.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check-version.outputs.changed }}
      new-version: ${{ steps.check-version.outputs.new-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check-version
        run: |
          cd fastvideo-kernel
          # Get current commit's version from pyproject.toml
          # Use ^ to match start of line to avoid matching minimum-version
          NEW_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          echo "New version: $NEW_VERSION"

          # Get previous version from git history
          # Note: git show expects path relative to repo root
          OLD_VERSION=$(git show HEAD~1:fastvideo-kernel/pyproject.toml | grep -oP '^version\s*=\s*"\K[^"]+' || echo "0.0.0")
          echo "Old version: $OLD_VERSION"

          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "Version changed from $OLD_VERSION to $NEW_VERSION"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Version did not change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version-change
    if: ${{ needs.check-version-change.outputs.version-changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build kernel via HF Jobs and upload to hao-ai-lab/fastvideo-kernel
        # Pinned to a commit SHA: this third-party action receives HF_TOKEN.
        uses: huggingface/kernel-builder-job@ee590cee1ff01e922310401f18d5554b8da448ac # main, 2026-06-03
        with:
          token: ${{ secrets.HF_TOKEN }}
          namespace: hao-ai-lab
          flavor: cpu-xl
          timeout: "21600"
          script: |
            set +x
            export HF_TOKEN="${{ secrets.HF_TOKEN }}"
            export GIT_LFS_SKIP_SMUDGE=1

            git clone "${{ github.server_url }}/${{ github.repository }}" FastVideo
            cd FastVideo
            git checkout "${{ github.sha }}"
            git submodule update --init --recursive fastvideo-kernel/include/cutlass fastvideo-kernel/include/tk
            cd fastvideo-kernel

            UPLOAD_BRANCH="${{ github.event.inputs.branch }}"
            BRANCH_ARGS=()
            if [ -n "${UPLOAD_BRANCH}" ]; then
              BRANCH_ARGS=(--branch "${UPLOAD_BRANCH}")
            fi

            nix run github:huggingface/kernels#kernel-builder -- build-and-upload \
              --max-jobs 4 \
              --cores 8 \
              --repo-id hao-ai-lab/fastvideo-kernel \
              "${BRANCH_ARGS[@]}"
