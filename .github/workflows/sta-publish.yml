name: Build and Publish to PyPI

on:
  push:
    branches:
      - you-pypi-packaging-1  # Runs only when pushing to main
    paths:
      - "csrc/sliding_tile_attention/**"
      - ".github/workflows/sta-publish.yml"

jobs:
  release-build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04  # Use CUDA 12.4 Docker image

    steps:
      - name: Set up Python 3.10+
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies (GCC, Clang, CUDA Paths, Git)
        run: |
          apt update
          apt install -y git gcc-11 g++-11 clang-11
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100 --slave /usr/bin/g++ g++ /usr/bin/g++-11

          # Set CUDA environment variables
          export CUDA_HOME=/usr/local/cuda-12.4
          export PATH=${CUDA_HOME}/bin:${PATH}
          export LD_LIBRARY_PATH=${CUDA_HOME}/lib64:$LD_LIBRARY_PATH
          
          # Verify installation
          gcc --version
          g++ --version
          clang-11 --version
          nvcc --version

      - name: Install Python dependencies
        run: |
          apt-get update && apt-get install -y python3-pip
          pip install --upgrade pip
          pip install setuptools wheel twine
          pip install torch==2.5.0 --index-url https://download.pytorch.org/whl/cu124

      - name: Check out repository
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 1
          set-safe-directory: true

      - name: Extract current package version
        id: get_version
        run: |
          cd csrc/sliding_tile_attention
          CURRENT_VERSION=$(grep -oP '(?<=VERSION = ")[0-9.]+' setup.py)
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "Current version: $CURRENT_VERSION"

      - name: Debug via tmate (SSH into Runner)
        uses: mxschmitt/action-tmate@v3

      - name: Build and Install Package
        run: |
          cd csrc/sliding_tile_attention  # Move into the correct folder
          git submodule update --init --recursive tk # Ensure ThunderKittens submodule is initialized
          python setup.py sdist bdist_wheel  # Compile package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: csrc/sliding_tile_attention/dist/


  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write  # Needed for OIDC Trusted Publishing

    environment:
      name: pypi
      url: https://pypi.org/project/st-attn/${{ env.VERSION }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Auto-increment package version after successful upload
        run: |
          cd csrc/sliding_tile_attention
          
          # Extract current version again
          CURRENT_VERSION=$(grep -oP '(?<=VERSION = ")[0-9.]+' setup.py)

          # Increment the patch version (e.g., 0.0.1 → 0.0.2)
          NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. -v OFS=. '{$NF += 1 ; print}')

          # Update VERSION in setup.py
          sed -i "s/^VERSION = \"[0-9.]*\"/VERSION = \"$NEW_VERSION\"/" setup.py
          
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Updated version to $NEW_VERSION"

      - name: Commit updated version to GitHub
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add csrc/sliding_tile_attention/setup.py
          git commit -m "Bump version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin you-pypi-packaging-1 || echo "No new version to push"
