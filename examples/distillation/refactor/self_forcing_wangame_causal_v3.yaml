# V3 config: WanGame causal Self-Forcing distillation (40-step teacher -> 4-step student).
#
# Uses _target_-based instantiation — each model role is an independent
# class instance; the method class is resolved directly from the YAML.
#
# To warmstart from a DCP checkpoint, first convert it to diffusers format
# using `dcp_to_diffusers`, then point `init_from` at the converted directory.

models:
  student:
    _target_: fastvideo.train.models.wangame.WanGameCausalModel
    # TODO: update to converted diffusers path
    init_from: /mnt/weka/home/hao.zhang/kaiqin/wg_models/WanGame-2.1-0223-9000steps
    trainable: true
  teacher:
    _target_: fastvideo.train.models.wangame.WanGameCausalModel
    # TODO: update to converted diffusers path
    init_from: /mnt/weka/home/hao.zhang/kaiqin/wg_models/WanGame-2.1-0223-9000steps
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.wangame.WanGameCausalModel
    # TODO: update to converted diffusers path
    init_from: /mnt/weka/home/hao.zhang/kaiqin/wg_models/WanGame-2.1-0223-9000steps
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.self_forcing.SelfForcingMethod
  # use_ema: true
  rollout_mode: simulate
  generator_update_interval: 5
  real_score_guidance_scale: 3.5

  # Critic / fake-score optimizer
  fake_score_learning_rate: 8.0e-6
  fake_score_betas: [0.0, 0.999]
  fake_score_lr_scheduler: constant

  warp_denoising_step: true
  dmd_denoising_steps: [1000,750,500,250]

  chunk_size: 3
  student_sample_type: sde
  same_step_across_blocks: false
  last_step_only: false
  context_noise: 0.0
  enable_gradient_in_rollout: true
  start_gradient_frame: 0

  cfg_uncond:
    on_missing: error
    action: keep
    image: keep
    text: keep

training:
  distributed:
    num_gpus: 32
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 32

  data:
    data_path: >-
      /mnt/weka/home/hao.zhang/mhuo/traindata_0205_1330/data/0_static_plus_w_only/preprocessed:1,
      /mnt/weka/home/hao.zhang/mhuo/traindata_0205_1330/data/1_wasd_only/preprocessed:1
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 20
    num_height: 352
    num_width: 640
    num_frames: 77

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.0, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0
    max_grad_norm: 1.0

  loop:
    max_train_steps: 4000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/wangame_self_forcing_4steps_v3
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 3

  tracker:
    project_name: distillation_wangame_r
    run_name: wangame_self_forcing_4steps_v3

  model:
    enable_gradient_checkpointing_type: null

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
  # ema:
  #   _target_: fastvideo.train.callbacks.ema.EMACallback
  #   beta: 0.9999
  validation:
    _target_: fastvideo.train.callbacks.validation.ValidationCallback
    pipeline_target: fastvideo.pipelines.basic.wan.wangame_causal_dmd_pipeline.WanGameCausalDMDPipeline
    dataset_file: examples/training/finetune/WanGame2.1_1.3b_i2v/validation_random_8.json
    every_steps: 100
    sampling_steps: [4]
    sampler_kind: sde
    rollout_mode: streaming
    guidance_scale: 1.0
    num_frames: 69
    dmd_denoising_steps: [1000, 750, 500, 250]

pipeline:
  flow_shift: 3
  sampler_kind: sde
