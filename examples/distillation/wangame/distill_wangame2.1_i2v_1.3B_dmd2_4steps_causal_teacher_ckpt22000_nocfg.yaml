# WanGame causal DMD2 distillation (40-step teacher -> 4-step student).
#
# - Teacher weights come from a DFSFT causal checkpoint (DCP format).
# - Student/Critic are warmstarted from the same checkpoint (copied from
#   checkpoint role `student`).
# - Role `path` still points at a *base* wangame model directory (needed to
#   load configs/architectures); `init_from_checkpoint` overwrites weights.

recipe:
  family: wangame
  method: dmd2

roles:
  student:
    family: wangame
    path: /mnt/weka/home/hao.zhang/kaiqin/wg_models/WanGame-2.1-0223-9000steps
    trainable: true
    variant: causal
    init_from_checkpoint: outputs/wangame_dfsft_causal_4n8g/persistent/checkpoint-22000
  teacher:
    family: wangame
    path: /mnt/weka/home/hao.zhang/kaiqin/wg_models/WanGame-2.1-0223-9000steps
    trainable: false
    disable_custom_init_weights: true
    variant: causal
    init_from_checkpoint: outputs/wangame_dfsft_causal_4n8g/persistent/checkpoint-22000
    init_from_checkpoint_role: student
  critic:
    family: wangame
    path: /mnt/weka/home/hao.zhang/kaiqin/wg_models/WanGame-2.1-0223-9000steps
    trainable: true
    disable_custom_init_weights: true
    variant: causal
    init_from_checkpoint: outputs/wangame_dfsft_causal_4n8g/persistent/checkpoint-22000
    init_from_checkpoint_role: student

training:
  # Distributed
  num_gpus: 8
  sp_size: 1
  tp_size: 1
  hsdp_replicate_dim: 8
  hsdp_shard_dim: 1

  # Data (parquet dataset folder).
  # Supports comma-separated `path` or `path:N` (repeat count) entries.
  data_path: >-
    /mnt/weka/home/hao.zhang/kaiqin/traindata_0208_2000/data/wasd4holdrandview_simple_1key1mouse1/preprocessed
  dataloader_num_workers: 4

  # Batch / shape
  train_batch_size: 1
  train_sp_batch_size: 1
  gradient_accumulation_steps: 1
  num_latent_t: 20
  num_height: 352
  num_width: 640
  num_frames: 77

  # Output / steps
  output_dir: outputs/wangame_dmd2_4steps_distill_causal_teacher22000
  max_train_steps: 4000
  seed: 1000
  checkpoints_total_limit: 3

  # Optimizer (student)
  learning_rate: 2.0e-6
  mixed_precision: bf16
  betas: "0.0,0.999"
  weight_decay: 0.01
  lr_scheduler: constant
  lr_warmup_steps: 0
  max_grad_norm: 1.0

  # Optimizer (critic / fake-score)
  fake_score_learning_rate: 8.0e-6
  fake_score_betas: "0.0,0.999"
  fake_score_lr_scheduler: constant

  # Distillation (method-agnostic knobs)
  training_cfg_rate: 0.0
  min_timestep_ratio: 0.02
  max_timestep_ratio: 0.98
  enable_gradient_checkpointing_type: full

  # Checkpointing
  training_state_checkpointing_steps: 1000
  weight_only_checkpointing_steps: 1000

  # Tracking / validation
  tracker_project_name: distillation_wangame
  wandb_run_name: wangame_dmd2_4steps_distill_causal_teacher22000
  validation:
    enabled: true
    dataset_file: examples/training/finetune/WanGame2.1_1.3b_i2v/validation_random_8.json
    every_steps: 50
    sampling_steps: [4]
    sampler_kind: sde
    guidance_scale: 1.0

default_pipeline_config:
  flow_shift: 3
  sampler_kind: sde

method_config:
  rollout_mode: simulate
  generator_update_interval: 5
  real_score_guidance_scale: 3.5

  # Few-step schedule (single source of truth for the method).
  # These are "step indices" and will be warped by the (shifted) scheduler.
  warp_denoising_step: true
  dmd_denoising_steps: [1000,750,500,250]

  # Define CFG "uncond" semantics (operation-centric).
  cfg_uncond:
    on_missing: error
    action: keep
    image: keep
    text: keep

