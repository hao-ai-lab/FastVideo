# WanGame bidirectional finetune (4 nodes × 8 GPUs).
#
# This is a "from scratch" run in the sense that it does not warmstart from any
# DCP checkpoint (no `init_from_checkpoint`). It starts from the base pretrained
# `roles.student.path` weights.

recipe:
  family: wangame
  method: finetune

roles:
  student:
    family: wangame
    path: weizhou03/Wan2.1-Game-Fun-1.3B-InP-Diffusers
    trainable: true

training:
  # Distributed (4 nodes × 8 GPUs = 32 ranks)
  num_gpus: 32
  sp_size: 1
  tp_size: 1
  hsdp_replicate_dim: 1
  hsdp_shard_dim: 32

  # Data (parquet dataset folder)
  #
  # Supports comma-separated `path` or `path:N` (repeat count) entries.
  # N=0 means skip (handy to toggle datasets without deleting lines).
  data_path: >-
    /mnt/weka/home/hao.zhang/mhuo/traindata_0204_2130/preprocessed:0,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0204_1600/preprocessed:0,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0205_1330/data/0_static_plus_w_only/preprocessed:1,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0205_1330/data/1_wasd_only/preprocessed:1,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0206_1200/data/wasdonly_alpha1/preprocessed:1,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0206_1200/data/camera/preprocessed:1,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0208_2000/data/camera4hold_alpha1/preprocessed:1,
    /mnt/weka/home/hao.zhang/mhuo/traindata_0208_2000/data/wasd4holdrandview_simple_1key1mouse1/preprocessed:1
  dataloader_num_workers: 4

  # Batch / shape
  train_batch_size: 1
  train_sp_batch_size: 1
  gradient_accumulation_steps: 1
  num_latent_t: 20
  num_height: 352
  num_width: 640
  num_frames: 77

  # Output / steps
  output_dir: outputs/wangame_finetune_bidi_4n8g
  max_train_steps: 200000
  seed: 1000
  checkpoints_total_limit: 2

  # Optimizer
  learning_rate: 1.0e-5
  mixed_precision: bf16
  betas: "0.9,0.999"
  weight_decay: 1.0e-4
  lr_scheduler: constant
  lr_warmup_steps: 0
  max_grad_norm: 1.0

  # Checkpointing
  training_state_checkpointing_steps: 1000
  weight_only_checkpointing_steps: 1000

  # Method-agnostic knobs
  training_cfg_rate: 0.0
  enable_gradient_checkpointing_type: full

  # Tracking / validation
  tracker_project_name: distillation_wangame
  wandb_run_name: wangame_finetune_bidirectional_4n8g_from_pretrained
  validation:
    enabled: true
    dataset_file: examples/training/finetune/WanGame2.1_1.3b_i2v/validation_random.json
    every_steps: 100
    sampling_steps: [40]
    sampler_kind: ode
    guidance_scale: 1.0

default_pipeline_config:
  flow_shift: 3
  sampler_kind: ode

method_config:
  attn_kind: dense
