generator:
  model_path: black-forest-labs/FLUX.2-klein-4B
  engine:
    num_gpus: 1
    use_fsdp_inference: false
    offload:
      dit: false
      vae: true
      text_encoder: true
      pin_cpu_memory: false
  pipeline:
    workload_type: t2i

server:
  host: 0.0.0.0
  port: 8011
  output_dir: outputs/interleave_flux2_klein

default_request:
  sampling:
    num_frames: 1
    fps: 1
    height: 1024
    width: 1024
    num_inference_steps: 4
    guidance_scale: 1.0
  output:
    save_video: true
    return_frames: false
