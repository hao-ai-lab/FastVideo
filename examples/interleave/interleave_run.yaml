# Native FastVideo interleave-run example.
#
# This default runs a lightweight one-step trace with the fallback planner and
# accept-all critic. Switch planner.kind / critic.kind to interleave_thinker and
# set the model fields below to run the real InterleaveThinker planner/critic.

generator:
  model_path: black-forest-labs/FLUX.2-klein-4B
  engine:
    num_gpus: 1
    use_fsdp_inference: false
    offload:
      dit: false
      vae: true
      text_encoder: true
      pin_cpu_memory: false
  pipeline:
    workload_type: t2i

image_backend:
  kind: fastvideo

planner:
  kind: single_prompt
  max_attempts_per_step: 1
  # Real planner example:
  # kind: interleave_thinker
  # init_from: InterleaveThinker/InterleaveThinker-Planner-8B
  # processor_from: Qwen/Qwen3-VL-8B-Instruct
  # trainable: false
  # torch_dtype: bf16
  # device_map: cuda:0
  # attn_implementation: sdpa
  # max_new_tokens: 2048

critic:
  kind: accept_all
  # Real critic example:
  # kind: interleave_thinker
  # init_from: InterleaveThinker/Critic-SFT-8B
  # processor_from: Qwen/Qwen3-VL-8B-Instruct
  # trainable: false
  # torch_dtype: bf16
  # device_map: cuda:0
  # attn_implementation: sdpa
  # max_new_tokens: 512

interleave:
  output_dir: outputs/interleave_run
  trace_path: outputs/interleave_run/trace.json
  include_images_in_trace: false

request:
  prompt: a brushed steel espresso machine on a marble counter, morning window light
  sampling:
    num_frames: 1
    fps: 1
    height: 1024
    width: 1024
    num_inference_steps: 4
    guidance_scale: 1.0
    seed: 0
  output:
    save_video: true
    return_frames: false
