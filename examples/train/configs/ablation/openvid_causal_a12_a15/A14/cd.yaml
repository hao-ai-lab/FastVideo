    every_steps: 200
    sampling_steps:
    - 4
    guidance_scale: 3.0
    num_frames: 249
    output_dir: /mnt/lustre/vlm-k1kong/experiments/openvid_causal_a12_a15/prepared_20260717/A14/cd/validation
    offload_training_state: true
    unload_pipeline_after_validation: true
pipeline:
  flow_shift: 5
  dit_config:
    local_attn_size: 6
    sink_size: 1
    rope_cache_policy: absolute
    causal_train_attention: triton
