    transformer_override_safetensor: /mnt/lustre/vlm-k1kong/experiments/openvid_causal_a12_a15/prepared_20260717/A14/export/tf/transformer/model.safetensors
  teacher:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
    transformer_override_safetensor: /mnt/lustre/vlm-k1kong/experiments/openvid_causal_a12_a15/prepared_20260717/A14/export/tf/transformer/model.safetensors
  ema:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
    transformer_override_safetensor: /mnt/lustre/vlm-k1kong/experiments/openvid_causal_a12_a15/prepared_20260717/A14/export/tf/transformer/model.safetensors
method:
  _target_: fastvideo.train.methods.consistency_model.causal_cd.CausalConsistencyDistillationMethod
  discrete_cd_N: 48
  guidance_scale: 3.0
  ema_decay: 0.99
  ema_start_step: 200
training:
  distributed:
    num_gpus: 4
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 4
  data:
    data_path: /mnt/lustre/vlm-s4duan/openvid_1m/combined_parquet_dataset
    dataloader_num_workers: 0
    train_batch_size: 2
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 31
    num_height: 480
    num_width: 832
    num_frames: 121
  optimizer:
    learning_rate: 2.0e-06
    betas:
    - 0.0
    - 0.999
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0
  loop:
    max_train_steps: 2000
    gradient_accumulation_steps: 8
  checkpoint:
    output_dir: /mnt/lustre/vlm-k1kong/experiments/openvid_causal_a12_a15/prepared_20260717/A14/cd/checkpoints
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 2
  tracker:
    trackers:
    - wandb
    project_name: causal_forcing_openvid_a12_a15
    run_name: A14_sink1_local6_absolute_chunk3_cd2k_from_tf3k_openvid_gbs64
  model:
    enable_gradient_checkpointing_type: full
callbacks:
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.wan.wan_causal_pipeline.WanCausalPipeline
