# MatrixGame causal diffusion-forcing SFT with the new trainer framework.
#
# This mirrors the legacy matrixgame_ar_diffusion_pipeline, but uses the
# modular train/ architecture. By default it keeps the legacy latent-wise
# timestep behavior.

models:
  student:
    _target_: fastvideo.train.models.matrixgame.matrixgame_causal.MatrixGameCausalModel
    init_from: ../mg_models/Solaris-6K
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.dfsft.DiffusionForcingSFTMethod
  chunk_size: 3
  share_timestep_within_chunk: false

training:
  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 1

  data:
    data_path: /mnt/weka/home/hao.zhang/kaiqin/solaris/datasets/vpt/vpt/train_81f/preprocessed_0306
    dataloader_num_workers: 1
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 21
    num_height: 352
    num_width: 640
    num_frames: 81

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 1.0e-4
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 1500000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: checkpoints/matrixgame_dfsft_v3
    training_state_checkpointing_steps: 100
    checkpoints_total_limit: 3

  tracker:
    project_name: mg_dfsft_solaris
    run_name: matrixgame_dfsft_v3

  model:
    enable_gradient_checkpointing_type: full

pipeline:
  flow_shift: 3
