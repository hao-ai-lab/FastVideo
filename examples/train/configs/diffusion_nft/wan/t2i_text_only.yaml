# DiffusionNFT: Wan 2.1 T2V 1.3B used as a text-to-image policy.
#
# The model is treated as an image generator by setting the video latent length
# and frame count to 1. The data path points at the same text-only parquet
# format used by the DMD2 text-only launcher.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true

method:
  _target_: fastvideo.train.methods.diffusion_nft.nft.DiffusionNFTMethod

  # Collection round: sample clean image latents from the current policy, decode
  # one frame, score rewards, then train on the forward process.
  sample_timesteps: [1000, 750, 500, 250]
  sample_guidance_scale: 1.0
  num_images_per_prompt: 2
  inner_epochs: 1

  # Training round: trainer max_train_steps still means optimizer updates.
  train_batch_size: 1
  train_timestep_fraction: 1.0
  nft_beta: 1.0
  adv_clip_max: 5.0
  adv_mode: all
  global_std: true
  kl_weight: 0.0

  # Dependency-light default reward for smoke runs. Heavier rewards from the
  # local DiffusionNFT Flow-GRPO package can be configured here when installed.
  reward_fn:
    rewards:
      jpeg_incompressibility: 1.0

training:
  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 1

  data:
    data_path: data/train_text_only_diffusion_nft_preprocessed
    preprocessed_data_type: text_only
    dataloader_num_workers: 0
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 1
    num_height: 448
    num_width: 832
    num_frames: 1

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 20
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/wan2.1_diffusion_nft_text_only
    training_state_checkpointing_steps: 10
    checkpoints_total_limit: 2

  tracker:
    project_name: diffusion_nft_wan_text_only
    run_name: wan2.1_diffusion_nft_text_only

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0

pipeline:
  flow_shift: 8
