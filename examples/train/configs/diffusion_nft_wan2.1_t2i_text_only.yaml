# DiffusionNFT: Wan 2.1 T2V 1.3B used as a text-to-image policy.
#
# Wan can generate images by treating an image as a one-frame video:
# num_frames=1 and num_latent_t=1. The dataset is text-only parquet
# produced by the existing FastVideo text preprocessing pipeline.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true

method:
  _target_: fastvideo.train.methods.rl.diffusion_nft.DiffusionNFTMethod

  # Use "video" even for num_frames=1 so the same method path covers
  # normal multi-frame video runs; one frame is just the cheap debug case.
  media_type: video

  # Collection: sample clean latents from the current policy, decode
  # media for rewards, then train on the forward process.
  sample_timesteps: [1000, 900, 800, 700, 600, 500, 400, 300, 200, 100]
  sample_guidance_scale: 1.0
  num_samples_per_prompt: 24
  collection_batch_size: 9
  inner_epochs: 1

  # Training: trainer max_train_steps still means optimizer updates.
  train_batch_size: 9
  train_timestep_fraction: 0.99
  nft_beta: 1.0
  adv_clip_max: 5.0
  adv_mode: all
  global_std: true
  kl_weight: 0.0

  # Real DiffusionNFT reward package by default.
  reward_backend: diffusion_nft
  reward_fn:
    rewards:
      pickscore: 1.0

training:
  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 4

  data:
    data_path: data/train_text_only_diffusion_nft_preprocessed
    preprocessed_data_type: text_only
    dataloader_num_workers: 0
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 1
    num_height: 448
    num_width: 832
    num_frames: 1

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 1.0e-4
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 100
    gradient_accumulation_steps: 16

  checkpoint:
    output_dir: outputs/wan2.1_diffusion_nft_text_only
    training_state_checkpointing_steps: 30
    checkpoints_total_limit: 2

  tracker:
    project_name: diffusion_nft_wan_text_only
    run_name: wan2.1_diffusion_nft_text_only

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    max_grad_norm: 1.0

pipeline:
  flow_shift: 8
