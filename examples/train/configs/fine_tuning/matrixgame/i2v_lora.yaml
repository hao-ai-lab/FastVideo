# Matrix-Game 2.0 I2V LoRA finetune.
#
# Swap `init_from` among:
# - FastVideo/Matrix-Game-2.0-Base-Diffusers
# - FastVideo/Matrix-Game-2.0-GTA-Diffusers
# - FastVideo/Matrix-Game-2.0-TempleRun-Diffusers
#
# This path expects MatrixGame-preprocessed parquet data that includes
# clip_feature / first_frame_latent / keyboard_cond / mouse_cond.

models:
  student:
    _target_: fastvideo.train.models.matrixgame.MatrixGameModel
    init_from: FastVideo/Matrix-Game-2.0-Base-Diffusers
    trainable: true
    lora_rank: 16
    lora_alpha: 32
    lora_target_modules:
      - to_q
      - to_k
      - to_v
      - to_out

method:
  _target_: fastvideo.train.methods.fine_tuning.finetune.FineTuneMethod

training:
  dit_precision: bf16

  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 1

  data:
    data_path: footsies-dataset/preprocessed/combined_parquet_dataset
    dataloader_num_workers: 1
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 42
    num_latent_t: 20
    num_height: 352
    num_width: 640
    num_frames: 77

  optimizer:
    learning_rate: 2.0e-5
    betas: [0.9, 0.999]
    weight_decay: 1.0e-4
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 10
    gradient_accumulation_steps: 4

  checkpoint:
    output_dir: outputs/matrixgame_i2v_lora_debug
    training_state_checkpointing_steps: 5
    checkpoints_total_limit: 2
    resume_from_checkpoint: null

  tracker:
    project_name: matrixgame_finetune
    run_name: matrixgame_i2v_lora_debug

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0

  validation:
    _target_: fastvideo.train.callbacks.validation.ValidationCallback
    pipeline_target: fastvideo.pipelines.basic.matrixgame.matrixgame_i2v_pipeline.MatrixGamePipeline
    dataset_file: examples/training/finetune/MatrixGame2.0/validation.json
    every_steps: 0
    sampling_steps: [20]
    guidance_scale: 6.0

pipeline:
  flow_shift: 5
