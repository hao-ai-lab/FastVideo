# WanTrack causal I2V teacher-forcing fine-tuning.
#
# Build models/wantrack-control-causal-init with the checkpoint converter's
# --causal flag. Track IDs and the full encoded track map are shared by every
# latent chunk.

models:
  student:
    _target_: fastvideo.train.models.wantrack.WanTrackCausalModel
    init_from: models/wantrack-control-causal-init
    trainable: true
    track_augmentation:
      enabled: true
      min_points: 1000
      max_points: 2500
      temporal_mask_probability: 0.2
      temporal_mask_chunk_size: 8
      motion_dropout_probability: 0.0
      text_dropout_probability: 0.0

method:
  _target_: fastvideo.train.methods.fine_tuning.tfsft.TeacherForcingSFTMethod
  chunk_size: 3

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/wantrack/preprocessed/combined_parquet_dataset
    preprocessed_data_type: i2v_track
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 21
    num_height: 480
    num_width: 832
    num_frames: 81

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 4000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/wantrack_causal_i2v
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 3
    resume_from_checkpoint: null

  tracker:
    project_name: fastvideo
    run_name: wantrack_causal_i2v

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0
  track_validation:
    _target_: fastvideo.train.callbacks.track_validation.TrackValidationCallback
    every_steps: 250
    num_val_samples: 2
    num_inference_steps: 30
    guidance_scale: 3.0
    motion_guidance_scale: 1.5
    validate_at_start: false

pipeline:
  flow_shift: 5
  dit_config:
    local_attn_size: 6
    sink_size: 1
    rope_cache_policy: relativistic
    causal_train_attention: triton
