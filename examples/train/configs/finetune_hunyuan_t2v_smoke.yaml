# HunyuanVideo T2V smoke test — uses Wan data (shapes match).
# NOT semantically correct, just verifies training loop runs.

models:
  student:
    _target_: fastvideo.train.models.hunyuan.HunyuanModel
    init_from: hunyuanvideo-community/HunyuanVideo
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.finetune.FineTuneMethod

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/Wan-Syn_small
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 20
    num_height: 448
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 1.0e-5
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 10
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/hunyuan_smoke_test
    training_state_checkpointing_steps: 0
    checkpoints_total_limit: 1

  tracker:
    project_name: fastvideo_hunyuan
    run_name: hunyuan_smoke_test

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0

pipeline:
  flow_shift: 7
