# InterleaveThinker planner backend smoke config.
#
# This config is intentionally minimal: it verifies that the planner Qwen3-VL
# actor target and actor-specific SFT method can be assembled with the real
# checkpoint/processor pair. It intentionally omits a dataset so --dry-run
# stops after build_from_config.

models:
  student:
    _target_: fastvideo.train.models.interleave_thinker.InterleaveThinkerPlannerModel
    init_from: InterleaveThinker/InterleaveThinker-Planner-8B
    processor_from: Qwen/Qwen3-VL-8B-Instruct
    load_backend: true
    torch_dtype: auto
    attn_implementation: flash_attention_2
    freeze_vision_tower: true
    freeze_multi_modal_projector: true
    enable_gradient_checkpointing: true
    max_prompt_length: 16384
    max_response_length: 4096
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.InterleaveThinkerSFTMethod

training:
  data:
    data_path: ""
    train_batch_size: 1
    dataloader_num_workers: 0
    seed: 42

  optimizer:
    learning_rate: 1.0e-5

  loop:
    max_train_steps: 1
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/interleave_thinker_planner_smoke

  tracker:
    trackers: []
