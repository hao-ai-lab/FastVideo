# KD Test: Causal Wan 1.3B ODE-init
#
# Smoke-test for KDCausalMethod on a tiny 16-sample dataset.
# Uses 1.3B as teacher (instead of 14B) so everything fits on 1 GPU.
#
# Step 1 — Run KD training:
#   torchrun --nproc_per_node=1 -m fastvideo.train.entrypoint.train \
#       --config examples/train/configs/kdtest/kd_causal.yaml
#
# Step 2 — Export ode_init checkpoint:
#   python -m fastvideo.train.entrypoint.dcp_to_diffusers \
#       --role student \
#       --checkpoint_dir outputs/kdtest/kd_causal/latest \
#       --output_dir outputs/kdtest/kd_ode_init
#
# Step 3 — Run Self-Forcing with the exported ode_init:
#   torchrun --nproc_per_node=1 -m fastvideo.train.entrypoint.train \
#       --config examples/train/configs/kdtest/self_forcing_causal.yaml
#
# Success criteria:
#   - Cache generates 16 .pt files under data/kd_test_cache/samples/
#   - kd_loss decreases steadily and approaches ~0 by step 200

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: wlsaidhi/SFWan2.1-T2V-1.3B-Diffusers
    trainable: true
  teacher:                          # using 1.3B for single-GPU test; swap to 14B for real runs
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.knowledge_distillation.kd.KDCausalMethod
  teacher_path_cache: data/kd_test_cache_small
  t_list: [999, 937, 833, 624, 0]
  student_sample_steps: 4
  teacher_inference_steps: 48
  teacher_guidance_scale: 1.0       # no CFG for speed; use 3.5 for real runs
  num_frames_per_block: 3

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/Wan-Syn_small
    dataloader_num_workers: 0
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 42
    num_latent_t: 20
    num_height: 448
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 7e-5
    betas: [0.9, 0.999]
    weight_decay: 0.0
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 300
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/kdtest/kd_causal
    training_state_checkpointing_steps: 300
    checkpoints_total_limit: 1

  tracker:
    project_name: kd-test
    run_name: kd_causal_smoke

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    max_grad_norm: 1.0

pipeline:
  flow_shift: 5
