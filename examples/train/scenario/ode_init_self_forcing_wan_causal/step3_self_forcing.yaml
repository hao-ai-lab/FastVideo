# Self-Forcing Test: Causal Wan 1.3B
#
# Smoke-test for SelfForcingMethod on a tiny 16-sample dataset.
# Run this AFTER kd_causal.yaml + dcp_to_diffusers export.
#
# Prerequisite — export ode_init from the KD run:
#   python -m fastvideo.train.entrypoint.dcp_to_diffusers \
#       --role student \
#       --checkpoint_dir outputs/kdtest/kd_causal/latest \
#       --output_dir outputs/kdtest/kd_ode_init
#
# Then run this config:
#   torchrun --nproc_per_node=1 -m fastvideo.train.entrypoint.train \
#       --config examples/train/scenario/ode_init_self_forcing_wan_causal/self_forcing_causal.yaml
#
# Success criteria:
#   - generator_loss and critic_loss both finite at step 0
#   - Validation videos logged to tracker every 20 steps
#   - No crash through max_train_steps=100

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: wlsaidhi/SFWan2.1-T2V-1.3B-Diffusers
    trainable: true
    transformer_override_safetensor: outputs/kdtest/kd_ode_init/transformer/model.safetensors
  teacher:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-14B-Diffusers
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.self_forcing.SelfForcingMethod
  rollout_mode: simulate
  generator_update_interval: 5
  real_score_guidance_scale: 4.5
  dmd_denoising_steps: [1000, 750, 500, 250]

  chunk_size: 3
  student_sample_type: sde
  context_noise: 0.0
  enable_gradient_in_rollout: true
  start_gradient_frame: 0

  # Critic optimizer
  fake_score_learning_rate: 8.0e-6
  fake_score_betas: [0.0, 0.999]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/Wan-Syn_small
    dataloader_num_workers: 0
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 42
    num_latent_t: 20
    num_height: 448
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 1e-5
    betas: [0.0, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 100
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/kdtest/self_forcing_causal
    training_state_checkpointing_steps: 100
    checkpoints_total_limit: 1

  tracker:
    project_name: kd-test
    run_name: self_forcing_causal_smoke

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.wan.wan_causal_dmd_pipeline.WanCausalDMDPipeline
    dataset_file: examples/train/scenario/ode_init_self_forcing_wan_causal/validation.json
    every_steps: 20
    sampling_steps: [4]
    sampling_timesteps: [1000, 750, 500, 250]
    num_frames: 69
    guidance_scale: 6.0

pipeline:
  flow_shift: 5
