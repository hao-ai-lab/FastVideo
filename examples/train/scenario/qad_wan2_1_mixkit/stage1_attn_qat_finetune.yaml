# QAD stage 1: Attn-QAT finetune of Wan2.1-T2V-1.3B on MixKit.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
    # Role-local: does not change the backend used by other models loaded in
    # this process.
    attention_backend: ATTN_QAT_TRAIN

method:
  _target_: fastvideo.train.methods.fine_tuning.finetune.FineTuneMethod

training:
  distributed:
    num_gpus: 4
    sp_size: 4
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 4

  data:
    data_path: data/HD-Mixkit-Finetune-Wan/combined_parquet_dataset
    dataloader_num_workers: 1
    train_batch_size: 1
    training_cfg_rate: 0.1
    seed: 1000
    num_latent_t: 20
    num_height: 480
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 5.0e-5
    betas: [0.9, 0.999]
    weight_decay: 1.0e-4
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 2000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: checkpoints/wan_t2v_qat_finetune
    training_state_checkpointing_steps: 500
    checkpoints_total_limit: 3

  tracker:
    project_name: wan_t2v_qat_finetune
    run_name: wan_t2v_qat_finetune

  model:
    enable_gradient_checkpointing_type: full

  dit_precision: fp32

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0
  validation:
    _target_: fastvideo.train.callbacks.validation.ValidationCallback
    pipeline_target: fastvideo.pipelines.basic.wan.wan_pipeline.WanPipeline
    dataset_file: examples/training/finetune/wan_t2v_1.3B/crush_smol/validation.json
    every_steps: 200
    sampling_steps: [50]
    guidance_scale: 3.0

pipeline:
  flow_shift: 3
