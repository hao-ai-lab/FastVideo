# QAD stage 2: distill the Attn-QAT student to three sampling steps.
#
# Export the stage-1 DCP checkpoint first, then point
# models.student.transformer_override_safetensor at the exported weight file.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    transformer_override_safetensor: checkpoints/wan_t2v_qat_finetune/diffusers/transformer/model.safetensors
    trainable: true
    attention_backend: ATTN_QAT_TRAIN
  teacher:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
    disable_custom_init_weights: true
    attention_backend: FLASH_ATTN
  critic:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
    disable_custom_init_weights: true
    attention_backend: FLASH_ATTN

method:
  _target_: fastvideo.train.methods.distribution_matching.dmd2.DMD2Method
  rollout_mode: data_latent
  generator_update_interval: 5
  dmd_denoising_steps: [1000, 757, 522]
  min_timestep_ratio: 0.02
  max_timestep_ratio: 0.98
  # The modular DMD method uses standard CFG:
  # uncond + scale * (cond - uncond). This is equivalent to the legacy
  # recipe's cond + 2.0 * (cond - uncond).
  real_score_guidance_scale: 3.0

  # The legacy recipe inherited these values from its global optimizer.
  fake_score_learning_rate: 2.0e-6
  fake_score_betas: [0.9, 0.999]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 4
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 4
    hsdp_shard_dim: 1

  data:
    data_path: data/HD-Mixkit-Finetune-Wan/combined_parquet_dataset
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 20
    num_height: 480
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 2000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: checkpoints/wan_t2v_distill_dmd_qat
    training_state_checkpointing_steps: 500
    checkpoints_total_limit: 3

  tracker:
    project_name: wan_t2v_distill_dmd_qat
    run_name: wan_t2v_distill_dmd_qat

  model:
    enable_gradient_checkpointing_type: full

  dit_precision: fp32

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0
  validation:
    _target_: fastvideo.train.callbacks.validation.ValidationCallback
    pipeline_target: fastvideo.pipelines.basic.wan.wan_dmd_pipeline.WanDMDPipeline
    dataset_file: examples/training/finetune/wan_t2v_1.3B/crush_smol/validation.json
    every_steps: 200
    sampling_steps: [3]
    sampling_timesteps: [1000, 757, 522]
    guidance_scale: 6.0

pipeline:
  flow_shift: 3
