# WanTrack EPIC-KITCHENS-200 finetune: egocentric human manipulation, 3 kitchens
# (P02/P04/P35), 200 clips x 121 frames @ 854x480 (trained at 480x832). Fun-Control init.
#
# Unlike the Wan-200 overfit run (WANTRACK_AUG=0, all 2500 tracks), this run turns the
# MotionStream sampler ON via launch env so we exercise the new coverage+informativeness
# sampler on a moving-camera dataset:
#   WANTRACK_AUG=1 WANTRACK_MIN_POINTS=1000 WANTRACK_MAX_POINTS=2500 \
#   WANTRACK_PMASK=0.2 WANTRACK_DIVERSITY=1.0 WANTRACK_UNIFORM_FRAC=0.3
# object_ids (SAM conf0.6) + track_weights (low-rank informativeness) come from the
# preprocessed parquet, so sampling = >=1 pt/object + lowrank-weighted + uniform.

models:
  student:
    _target_: fastvideo.train.models.wantrack.wantrack.WanTrackModel
    init_from: /mnt/weka/home/hao.zhang/shao/data/models/trackwan_1.3b_i2v_control_init
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.finetune.FineTuneMethod

training:
  model_path: /mnt/weka/home/hao.zhang/shao/data/models/trackwan_1.3b_i2v_control_init

  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 1

  data:
    data_path: /mnt/weka/home/hao.zhang/shao/data/motion_pipeline/epic_static_200/preprocessed_i2v_track/combined_parquet_dataset
    dataloader_num_workers: 2
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 31
    num_height: 480
    num_width: 832
    num_frames: 121

  optimizer:
    learning_rate: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 6000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: /mnt/weka/home/hao.zhang/shao/data/motion_pipeline/wantrack_epic_static200_out
    training_state_checkpointing_steps: 500
    checkpoints_total_limit: 2
    resume_from_checkpoint: latest

  tracker:
    trackers: [wandb]
    project_name: wantrack-bidir
    run_name: epic-static200-sampler

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0
  track_validation:
    _target_: fastvideo.train.callbacks.track_validation.TrackValidationCallback
    every_steps: 500
    num_val_samples: 2
    num_inference_steps: 30
    guidance_scale: 1.0
    fps: 25
    grid_stride: 3
    tail: 12
    validate_at_start: true
    seed: 1000

pipeline:
  flow_shift: 3
