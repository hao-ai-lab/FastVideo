# MatrixGame2 I2V LongLive-style streaming distillation: Zelda world model I2V Causal
# Student init from self forcing after 1k steps

models:
  student:
    _target_: fastvideo.train.models.matrixgame2.matrixgame2_causal.MatrixGame2CausalModel
    init_from: mignonjia/mg_sf_distilled_zelda_1k_steps 
    trainable: true
    # transformer_override_safetensor: /mnt/weka/home/hao.zhang/mhuo/FastVideo/outputs/matrixgame_dmd/checkpoints/mg_zelda_sf_m2/checkpoint-1000_weight_only/ema/generator_ema.safetensors
  teacher:
    _target_: fastvideo.train.models.matrixgame2.matrixgame2.MatrixGame2Model
    init_from: mignonjia/mg_bidirectional_zelda
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.matrixgame2.matrixgame2.MatrixGame2Model
    init_from: mignonjia/mg_bidirectional_zelda
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.streaming_long_tuning.StreamingLongTuningMethod
  rollout_mode: simulate
  generator_update_interval: 5
  dmd_denoising_steps: [1000, 750, 500, 250]
  warp_denoising_step: true
  min_timestep_ratio: 0.02
  max_timestep_ratio: 0.98

  chunk_size: 3
  student_sample_type: sde
  same_step_across_blocks: true
  last_step_only: false
  context_noise: 0.0
  enable_gradient_in_rollout: true
  start_gradient_frame: 0

  streaming_training: true
  streaming_chunk_size: 9
  streaming_max_length: 39
  streaming_fixed_overlap_latents: 3
  streaming_reencode_overlap_anchor: true
  streaming_anchor_inject_k: 1
  streaming_require_full_blocks: true
  train_first_chunk: true

  multi_phased_distill_schedule:
    - stage: streaming_long
      start_step: 0
      end_step: 3000
      num_latent_t: 39
      streaming_training: true
      streaming_chunk_size: 9
      streaming_max_length: 39
      streaming_fixed_overlap_latents: 3
      train_first_chunk: true

  # Critic optimizer
  fake_score_learning_rate: 3.0e-7
  fake_score_betas: [0.9, 0.95]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/zeldam2-clean
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1001
    num_latent_t: 39
    num_height: 480
    num_width: 832
    num_frames: 153

  optimizer:
    learning_rate: 3.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.0
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 3000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/zelda_causal_long_tuning
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 2

  tracker:
    project_name: wangame_sf
    run_name: mg2_39only_streaming_long

  model:
    enable_gradient_checkpointing_type: full

  dit_precision: fp32

callbacks:
  ema:
    decay: 0.99
    start_iter: 200
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.matrixgame2.matrixgame2_causal_dmd_pipeline.MatrixGame2CausalDMDPipeline
    dataset_file: data/worldmodel_validation_data/validation_zelda.json
    every_steps: 100
    sampling_steps: [4]
    sampling_timesteps: [1000, 750, 500, 250]
    num_frames: 153
    overlay_actions: true
    keyboard_value_scale: 1.0
    metrics:
      enabled: true
      names:
        - vbench.imaging_quality
        - vbench.aesthetic_quality
        - vbench.temporal_flickering
        - vbench.motion_smoothness
        - vbench.subject_consistency
        - vbench.background_consistency
        - vbench.dynamic_degree
        - optical_flow.synthetic_optical_flow
      calibration_path: assets/eval/worldmodel_synthetic_flow_calibration.json
      skip_missing_deps: true
      strict: false
      unload_after_validation: true

pipeline:
  flow_shift: 5
  dit_config:
    local_attn_size: 6
    sink_size: 1
