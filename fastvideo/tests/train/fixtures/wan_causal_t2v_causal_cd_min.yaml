# SPDX-License-Identifier: Apache-2.0
# Minimum config to run a single training step of
# CausalConsistencyDistillationMethod (Causal-Forcing++ Stage-2b) on
# WanCausalModel for the per-method smoke test. Uses the real Wan 2.1
# 1.3B checkpoint for both the trainable student and the frozen teacher
# (AR Euler-step target), with tiny synthetic latents.

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
  teacher:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
  ema:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false

method:
  _target_: fastvideo.train.methods.consistency_model.causal_cd.CausalConsistencyDistillationMethod
  discrete_cd_N: 12
  guidance_scale: 3.0
  ema_decay: 0.95

training:
  dit_precision: bf16

  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1

  data:
    seed: 42
    train_batch_size: 1
    training_cfg_rate: 0.0
    num_latent_t: 6
    num_height: 64
    num_width: 64
    num_frames: 21

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 1
    gradient_accumulation_steps: 1

pipeline: {}
