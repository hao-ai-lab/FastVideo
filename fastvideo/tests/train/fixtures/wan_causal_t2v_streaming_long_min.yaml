# SPDX-License-Identifier: Apache-2.0
# Minimum config to run single training steps of StreamingLongTuningMethod
# on WanCausalModel for the per-method smoke test. Uses the real Wan 2.1 1.3B
# checkpoint for the causal student and the bidirectional teacher/critic
# (mirroring the MatrixGame/LongLive production layout at 1.3B scale), with
# tiny synthetic latents.
#
# Deviations from the production zelda config, chosen to keep the smoke test
# transformer-only:
# - cfg_uncond.text: zero — avoids loading the UMT5 encoder for the
#   negative-prompt embedding on the teacher CFG branch.
# - streaming_reencode_overlap_anchor: false — avoids loading the VAE for the
#   overlap-anchor re-encode.

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
  teacher:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
  critic:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true

method:
  _target_: fastvideo.train.methods.distribution_matching.streaming_long_tuning.StreamingLongTuningMethod
  rollout_mode: simulate
  generator_update_interval: 1
  dmd_denoising_steps: [1000, 750, 500, 250]
  warp_denoising_step: true
  min_timestep_ratio: 0.02
  max_timestep_ratio: 0.98

  chunk_size: 3
  student_sample_type: sde
  same_step_across_blocks: true
  last_step_only: false
  context_noise: 0.0
  enable_gradient_in_rollout: true
  start_gradient_frame: 0

  cfg_uncond:
    text: zero

  streaming_training: true
  streaming_chunk_size: 3
  streaming_max_length: 6
  # With chunk_size 3 and fixed overlap 1, the second streaming chunk carries
  # 2 new frames + 1 overlap latent, exercising the overlap/chunk-mask path.
  streaming_fixed_overlap_latents: 1
  streaming_reencode_overlap_anchor: false

  multi_phased_distill_schedule:
    - stage: self_forcing
      start_step: 0
      end_step: 1
      num_latent_t: 3
    - stage: streaming_long
      start_step: 1
      num_latent_t: 6
      streaming_training: true
      streaming_chunk_size: 3
      streaming_max_length: 6
      streaming_fixed_overlap_latents: 1

  # Critic optimizer
  fake_score_learning_rate: 3.0e-7
  fake_score_betas: [0.9, 0.95]
  fake_score_lr_scheduler: constant

training:
  dit_precision: bf16

  # Required for grad-enabled rollouts: switches the student's streaming KV
  # cache to the checkpoint-safe variant so cache writes don't invalidate
  # tensors saved for backward.
  model:
    enable_gradient_checkpointing_type: full

  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1

  data:
    seed: 42
    train_batch_size: 1
    training_cfg_rate: 0.0
    num_latent_t: 6
    num_height: 64
    num_width: 64
    num_frames: 21

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 4
    gradient_accumulation_steps: 1

pipeline: {}
