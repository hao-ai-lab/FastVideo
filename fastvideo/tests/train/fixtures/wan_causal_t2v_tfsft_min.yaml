# SPDX-License-Identifier: Apache-2.0
# Minimum config to run a single training step of
# TeacherForcingSFTMethod on WanCausalModel for the per-method smoke
# test. Identical to wan_causal_t2v_dfsft_min.yaml except the method,
# which feeds clean history to the causal transformer (teacher forcing).

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.tfsft.TeacherForcingSFTMethod
  chunk_size: 3

training:
  dit_precision: bf16

  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1

  data:
    seed: 42
    train_batch_size: 1
    training_cfg_rate: 0.0
    num_latent_t: 6
    num_height: 64
    num_width: 64
    num_frames: 21

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 1
    gradient_accumulation_steps: 1

pipeline: {}
