[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "fastvideo"
version = "0.1.7"
description = "FastVideo"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    # Core Libraries
    "scipy==1.14.1",
    "six==1.16.0",
    "h5py==3.12.1",
    "requests>=2.32.2",

    # Machine Learning & Transformers
    "transformers==4.57.3",
    "tokenizers>=0.20.1",
    "sentencepiece==0.2.0",
    "timm==1.0.11",
    "peft>=0.15.0",
    "diffusers>=0.33.1",
    "torch==2.11.0",
    "torchvision",
    "torchaudio",

    # Acceleration & Optimization
    "accelerate==1.0.1",

    # Computer Vision & Image Processing
    "opencv-python==4.10.0.84",
    "pillow>=10.3.0",
    "imageio==2.36.0",
    "imageio-ffmpeg==0.5.1",
    "einops",

    # Experiment Tracking & Logging
    "wandb>=0.21.0",
    "loguru",
    "test-tube==0.7.5",
    
    # Miscellaneous Utilities
    "tqdm",
    "pytest",
    "PyYAML==6.0.1",
    "protobuf>=5.28.3",
    "gradio==5.32.0",
    "moviepy>=2.0.0",
    "flask",
    "flask_restful",
    "aiohttp",
    "aiofiles",
    "huggingface_hub",
    "cloudpickle",
    "omegaconf",

    # System & Monitoring Tools
    "gpustat",
    "watch",
    "remote-pdb",

    # Kernel & Packaging
    "fastvideo-kernel==0.2.6",
    "wheel",

    # Training Dependencies
    "torchdata",
    "pyarrow",
    "datasets==4.0.0",
    "av",

    # Preprocessing Dependencies
    "torchcodec",
    "ray>=2.49.1",
    "ftfy==6.3.1",

    # Job Runner
    "fastapi==0.129.0",
    "uvicorn==0.41.0"
]

[tool.uv]
prerelease = "allow"

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
torchvision = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
torchaudio = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
# ImageBind ships only on GitHub. ``[tool.uv.sources]`` lets uv resolve
# it at install time while keeping PyPI metadata clean (this table is
# uv-only). Pinned to a commit SHA for reproducible installs.
imagebind = { git = "https://github.com/facebookresearch/ImageBind.git", rev = "53680b02d7e37b19b124fa37bae4b6c98c38f5be" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[project.optional-dependencies]

# flash-attn: uv pip install flash-attn==2.8.1 --no-cache-dir --no-build-isolation


lint = [
    "pre-commit==4.0.1",
    "types-aiofiles",
    "types-requests",
]

test = [
    "av",
    "pytorch-msssim==1.0.0",
    "pytest",
    "pandas",
    "plotly",
]

# Eval extras. See fastvideo/eval/README.md for which install path
# covers which metrics. ``detectron2`` (vbench color/object_class/etc.)
# is CUDA-version-pinned and not cleanly pip-installable — install it
# separately as documented in the README.
eval-vbench     = ["openai-clip", "pyiqa", "easydict"]
eval-physics-iq = []
# Audio metrics. Covers all six registered ``audio.*`` metrics:
#   audio.clap_score, audio.frechet_distance       (HF CLAP / PaSST)
#   audio.kl_divergence                            (hear21passt)
#   audio.wer                                      (Whisper default; GLM-ASR opt-in via vendored package)
#   audio.audiobox_aesthetics                      (Meta's audiobox_aesthetics)
#   audio.desync                                   (Synchformer — vendored under _synchformer/)
#   audio.imagebind_score                          (ImageBind — git-installed via [tool.uv.sources])
#
# The SenseVoice (FunASR) WER fallback needs ``funasr`` which is heavy
# and rarely needed; left as install-on-demand.
#
# Notes on transitive deps:
# - We deliberately do not depend on the ``laion_clap`` pip package; it
#   pins ``numpy<2`` and would force a fastvideo-wide downgrade. HF's
#   ``transformers.ClapModel`` covers the same checkpoint family.
# - ``audiobox_aesthetics`` pulls ``torchaudio``; the cu128 mapping in
#   ``[tool.uv.sources]`` above ensures ``uv pip install`` picks the
#   matching wheel. With raw ``pip``, that mapping is ignored — install
#   torchaudio explicitly from ``https://download.pytorch.org/whl/cu128``
#   first.
# - ``imagebind`` is CC BY-NC-SA 4.0; the source dep keeps it outside
#   FastVideo's Apache 2.0 distribution.
eval-audio = ["jiwer", "librosa", "pyloudnorm", "hear21passt", "audiobox_aesthetics", "imagebind", "decord", "pytorchvideo"]
eval = [
    "decord", "lpips", "ptlflow", "qwen-vl-utils",
    "fastvideo[eval-vbench]", "fastvideo[eval-physics-iq]",
]
eval-full = ["fastvideo[eval]", "fastvideo[eval-audio]", "qwen-omni-utils"]

dev = [ "fastvideo[lint]", "fastvideo[test]", ]

prompt-safety = [
    "fasttext",
]

prompt-enhancer = [
    "httpx",
]

streaming = [
    "fastvideo[prompt-enhancer]",
    "fastvideo[prompt-safety]",
    "websockets",
]

rocm = [
    "amdsmi",
]

[project.scripts]
fastvideo = "fastvideo.entrypoints.cli.main:main"

[tool.setuptools.packages.find]
exclude = ["assets*", "docker*", "docs", "scripts*"]

[tool.wheel]
exclude = ["assets*", "docker*", "docs", "scripts*"]


[tool.mypy]
warn_unused_configs = true
ignore_missing_imports = true
disallow_untyped_calls = true
check_untyped_defs = true
follow_imports = "silent"

[tool.codespell]
# ``*/_vendored/*`` matches upstream-provenance files vendored under any
# ``_vendored/`` subdir (project-wide convention; mirrors the
# ``_``-prefixed auto-discovery skip).
skip = "./data,./wandb,ui/package-lock.json,*/_vendored/*"
# ``tread`` matches daVinci-MagiHuman's acronym "TReAD" (Token Routing
# and Early Drop). ``passt`` is the PaSST audio classifier (Koutini et
# al.). codespell lowercases ignore-words entries, so the single
# lowercase form silences all case variants.
ignore-words-list = "tread,passt"

[tool.ruff]
# Allow lines to be as long as 120.
line-length = 120
extend-exclude = [
    # Upstream submodules and vendored sources under fastvideo/third_party/
    # are not our style territory; modern-dep compat lives as runtime shims
    # in the consuming metric's __init__.py.
    "fastvideo/third_party/**",
]

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    # "I",
    "G",
]
ignore = [
    # star imports
    "F405", "F403",
    # lambda expression assignment
    "E731",
    # Loop control variable not used within loop body
    "B007",
    # f-string format
    "UP032",
    # line too long
    "E501",
]

[tool.ruff.lint.per-file-ignores]
# Ignore all files that end in `_test.py`.
"fastvideo/models/hunyuan/diffusion/pipelines/pipeline_hunyuan_video.py" = ["E741"]


[tool.yapf]
column_limit = 120

[tool.isort]
line_length = 120
use_parentheses = true
skip_gitignore = true


[project.urls]
Repository = "https://github.com/hao-ai-lab/FastVideo"
#  Used by Comfy Registry https://comfyregistry.org

[tool.comfy]
PublisherId = "fastvideo"
DisplayName = "FastVideo"
Icon = "https://raw.githubusercontent.com/hao-ai-lab/FastVideo/main/comfyui/assets/icon_simple.svg"
